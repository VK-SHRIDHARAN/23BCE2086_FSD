name: Deploy User Frontend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'userFrontend/**'
      - '.github/workflows/user-frontend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy User Frontend to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_USER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl "$RENDER_DEPLOY_HOOK"
          fi
